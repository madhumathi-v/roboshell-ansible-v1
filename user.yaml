- name: Setup User Module
  hosts: all
  become: true
  tasks:
    - name: Add Application User
      ansible.builtin.user:
        name: appuser
        system: true
        shell: /bin/false
        create_home: false

    - name: Copy Systemd Service File
      ansible.builtin.copy:
        src: user.service
        dest: /etc/systemd/system/user.service

    - name: Setup Nodejs Repository
      ansible.builtin.shell: curl -sL https://rpm.nodesource.com/setup_22.x | bash -
    
    - name: install Nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: latest
        disable_gpg_check: true
      
    - name: Remove Directory
      ansible.builtin.file:
         path: /app
         state: absent
    
    - name: Create Directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: appuser
        group: appuser
        recursive: true
        mode: 'o-wrx'
        
    - name: Unzip the user.zip file
      ansible.builtin.unarchive:
        src: 'https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/user.zip'
        dest: /app
        remote_src: yes

    - name: Install npm dependencies
      ansible.builtin.shell: npm install
      args:
        chdir: /app
        
    - name: Start User Service
      ansible.builtin.systemd_service:
        name: user
        state: restarted
        enabled: true
        daemon_reload: true

    

    