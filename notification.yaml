- name: Setup Notification
  hosts: all
  become: true
  tasks:
    - name: Create Application User
      ansible.builtin.user:
        name: notification
        state: present
        shell: /bin/false
        create_home: false
        home: /app

    - name: Copy Systemd Service File
      ansible.builtin.copy:
        src: notification.service
        dest: /etc/systemd/system/notification.service
       
    - name: Install Python and pip
      ansible.builtin.package:
        name: 
          - python3
          - python3-pip
        state: present

    - name: Remove directory if it exists
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create application directory    
      ansible.builtin.file:
        path: /app
        state: directory
        owner: notification
        group: notification
        mode: 'o-rwx'

    - name: Unzip application content
      ansible.builtin.unarchive:
        src:  https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/notification.zip
        dest: /app
        remote_src: yes
        
    - name: Restart Notification Service
      ansible.builtin.systemd:
        name: notification
        state: restarted
        enabled: true
        daemon_reload: yes
