- name: Setup Order Service
  hosts: all
  become: yes
  tasks:
    - name: Create application user
      ansible.builtin.user:
        name: appuser
        system: true
        shell: /bin/false
        create_home: false

    - name: Copy SystemD Service File
      ansible.builtin.copy:
        src: orders.service
        dest: /etc/systemd/system/orders.service


    - name: Install java-21-openjdk, java-21-openjdk-devel and maven 
      ansible.builtin.dnf:
        name: 
          - java-21-openjdk
          - java-21-openjdk-devel
          - maven
        state: latest

    - name: Remove Directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create Directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: appuser
        group: appuser
        mode: 'o-wxr'

    - name: restart orders service ,enable and daemon-reload
      ansible.builtin.systemd:
        name: orders
        state: restarted
        enabled: true
        daemon_reload: true

    