---
- name: Setup Order Service
  hosts: all
  become: true

  tasks:
    - name: Create application user
      ansible.builtin.user:
        name: appuser
        system: true
        shell: /bin/false
        create_home: false

    - name: Copy SystemD Service File
      ansible.builtin.copy:
        src: orders.service
        dest: /etc/systemd/system/orders.service

    - name: Install Java and Maven
      ansible.builtin.dnf:
        name:
          - java-21-openjdk
          - java-21-openjdk-devel
          - maven
        state: latest

    - name: Remove Application Directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create Application Directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: Download and Extract Orders Application
      ansible.builtin.unarchive:
        src: https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/orders.zip
        dest: /app
        remote_src: yes

    - name: Build Orders Application
      ansible.builtin.shell: mvn clean package -DskipTests
      args:
        chdir: /app

    - name: Copy Orders Jar
      ansible.builtin.shell: |
        cp target/*.jar /app/orders.jar
      args:
        chdir: /app

    - name: Set Ownership
      ansible.builtin.file:
        path: /app
        owner: appuser
        group: appuser
        recurse: true

    - name: Restart Orders Service
      ansible.builtin.systemd:
        name: orders
        state: restarted
        enabled: true
        daemon_reload: true