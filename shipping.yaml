- name: Setup Shipping Module
  hosts: all
  become: true
  tasks: 
    - name: Add Application User
      ansible.builtin.user:
        name: appuser
        system: true
        shell: /bin/false
        create_home: false
    - name: Copy SystemD Service File
      ansible.builtin.copy:
        src: shipping.service
        dest: /etc/systemd/system/shipping.service

    - name: install java 21 open jdk , java-21-openjdk-devel and maven
      ansible.builtin.dnf:
        name: 
          - java-21-openjdk
          - java-21-openjdk-devel
          - maven
        state: latest

    - name: Install MySQL Client
      ansible.builtin.dnf:
        name: mysql8.4
        state: present


    - name: Remove Directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: Create Directory
      ansible.builtin.file:
        path: /app
        state: directory
        owner: appuser
        group: appuser
        mode: 'o-wxr'

    - name: unzip the shipping.zip file
      ansible.builtin.unarchive:
        src: 'https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/shipping.zip'
        dest: /app
        remote_src: yes

    - name: Run shell commands related to mysql
      ansible.builtin.shell: |
        mysql -h 10.0.0.5 -u root -pRoboShop@1 < db/schema.sql
        mysql -h 10.0.0.5 -u root -pRoboShop@1 < db/app-user.sql
      args:
        chdir: /app

    - name: maven clean package dskipTests
      ansible.builtin.shell: mvn clean package -DskipTests
      args:
        chdir: /app

    - name: Copy Jar file
      ansible.builtin.shell: cp target/shipping.jar /app/shipping.jar
      args:
        chdir: /app

    - name: restart the shipping service, daemon-reload and enable the service
      ansible.builtin.systemd:
        name: shipping
        state: restarted
        enabled: true
        daemon_reload: true