- name: Setup Frontend Component
  hosts: all
  become: true
  tasks: 
    - name: Install nginx
      ansible.builtin.dnf:
        name: nginx
        state: latest

    - name: Copy files
      ansible.builtin.copy:
        src: nginx.conf
        dest: /etc/nginx/nginx.conf

    - name: Setup Nodejs Repository
      ansible.builtin.shell: curl -sL https://rpm.nodesource.com/setup_16.x | bash -

    - name: Import Nodesource GPG key
      ansible.builtin.rpm_key:
        state: present
        key: https://rpm.nodesource.com/pub/el/NODESOURCE-GPG-SIGNING-KEY-EL

    - name: install nodejs
      ansible.builtin.dnf:
        name: nodejs
        state: latest

    - name: Revome directory
      ansible.builtin.file:
        path: /tmp/frontend
        state: absent

    - name: Create directory
      ansible.builtin.file:
         path: /tmp/frontend
         state: directory

    - name: Unzip the frontend.zip file
      ansible.builtin.unarchive:
        src: 'https://raw.githubusercontent.com/raghudevopsb89/roboshop-microservices/main/artifacts/frontend.zip'
        dest: /tmp/frontend
        remote_src: yes
    - name: Install npm dependencies
      ansible.builtin.shell: npm install ; npm run build ; rm -rf /usr/share/nginx/html/* ; cp -r /tmp/frontend/dist/* /usr/share/nginx/html/
      args:
        chdir: /tmp/frontend

    - name: Start nginx
      ansible.builtin.systemd_service:
        name: nginx
        state: restarted
        enabled: true
      
